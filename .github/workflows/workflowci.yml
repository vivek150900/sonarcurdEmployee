name: Employee CRUD CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: employee_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build + Test + Coverage + Sonar
        env:
          SONAR_TOKEN: ${{ secrets.token }}
        run: |
          mvn clean verify \
          sonar:sonar \
          -Dsonar.projectKey=vivek150900_sonarcurdEmployee \
          -Dsonar.organization=viveklohakare \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${token}